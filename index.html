<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>社交·心衡 | 了解你的社交能量</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #F9F6F0;
            color: #5C4B3A;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .brand-symbol {
            width: 64px;
            height: 64px;
            margin: 0 auto 32px;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .brand-symbol-dark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #8B7D6B;
            border-radius: 64px 64px 0 0;
        }
        .brand-symbol-light {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #E8E0D0;
            border-radius: 0 0 64px 64px;
        }
        .brand-symbol-line {
            position: absolute;
            top: 48%;
            left: 12%;
            width: 76%;
            height: 2.5px;
            background: #FFFFFF;
            transform: rotate(-15deg);
            opacity: 0.85;
            z-index: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #5C4B3A;
        }
        .subtitle {
            font-size: 14px;
            color: #A49283;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .email-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }
        .email-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #E6DFD3;
            border-radius: 12px;
            background: #FFFFFF;
            font-size: 16px;
            color: #5C4B3A;
            outline: none;
            transition: border-color 0.2s;
        }
        .email-input:focus {
            border-color: #A3B18A;
        }
        .email-input::placeholder {
            color: #C5B5A0;
        }
        .cta-button {
            width: 100%;
            padding: 14px 18px;
            background-color: #A3B18A;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, opacity 0.3s;
        }
        .cta-button:hover {
            background-color: #8FA06E;
        }
        .cta-button.success {
            background-color: #8FA06E;
            pointer-events: none;
        }
        .footer-note {
            margin-top: 32px;
            font-size: 12px;
            color: #C5B5A0;
        }
        .message {
            margin-top: 16px;
            font-size: 14px;
            color: #A3B18A;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-symbol">
            <div class="brand-symbol-dark"></div>
            <div class="brand-symbol-light"></div>
            <div class="brand-symbol-line"></div>
        </div>
        
        <h1>社交7小时，独处0.5小时。<br>但你知道自己需要独处——<br>这份觉察，本身就是一种保护。</h1>
        
        <div class="subtitle">
            社交·心衡 · 首个采用“透支/富足”双视角的社交能量管理工具<br>
            专为高敏感人群设计 · 纯本地 · 零上传
        </div>

        <form class="email-form" id="emailForm">
            <input type="email" name="email" class="email-input" id="emailInput" placeholder="输入邮箱，第一时间知道我们何时上线" required>
            <button type="submit" class="cta-button" id="submitBtn">了解更多</button>
            <div id="formMessage" class="message"></div>
        </form>

        <div class="footer-note">
            我们承诺：绝不上传您的任何数据。
        </div>
    </div>

    <script>
        const FORM_ID = "1FAIpQLSdGRjqC3HmBMz0ofpoHcVMdsZykKT3iNHQOn4JVfMH9zq_UCQ";
        const FORM_URL = `https://docs.google.com/forms/d/e/${FORM_ID}/formResponse`;
        
        const form = document.getElementById('emailForm');
        const button = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('formMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            
            button.textContent = '正在提交...';
            button.classList.add('success');
            
            try {
                await fetch(FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                button.textContent = '已记录，我们会保持联系';
                messageDiv.textContent = '感谢你的关注！';
                form.reset();
                
            } catch (error) {
                button.textContent = '了解更多';
                button.classList.remove('success');
                messageDiv.textContent = '提交失败，请稍后重试';
            }
        });
    </script>
</body>
</html>
