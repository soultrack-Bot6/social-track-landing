<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>社交·心衡 | 了解你的社交能量</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #F9F6F0; /* 心衡米白 */
            color: #5C4B3A; /* 心衡深棕 */
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 40px 24px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .brand-symbol {
            width: 60px;
            height: 60px;
            margin: 0 auto 32px;
            border-radius: 50%;
            background: linear-gradient(180deg, #C5B5A0 0%, #E0D4C1 100%);
            position: relative;
        }
        .brand-symbol::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 1px;
            background: #FFFFFF;
            transform: rotate(-15deg);
            opacity: 0.6;
        }
        h1 {
            font-size: 28px;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #5C4B3A;
        }
        .subtitle {
            font-size: 14px;
            color: #A49283;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .email-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }
        .email-input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #E6DFD3;
            border-radius: 12px;
            background: #FFFFFF;
            font-size: 16px;
            color: #5C4B3A;
            outline: none;
            transition: border-color 0.2s;
        }
        .email-input:focus {
            border-color: #A3B18A;
        }
        .email-input::placeholder {
            color: #C5B5A0;
        }
        .cta-button {
            width: 100%;
            padding: 14px 18px;
            background-color: #A3B18A;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .cta-button:hover {
            background-color: #8FA06E;
        }
        .footer-note {
            margin-top: 32px;
            font-size: 12px;
            color: #C5B5A0;
        }
        .quote-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 28px 24px;
            margin: 24px auto 0;
            max-width: 360px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            text-align: left;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.6;
            color: #5C4B3A;
        }
        .quote-attribution {
            margin-top: 16px;
            text-align: right;
            font-size: 13px;
            color: #A49283;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #2C3E50; color: #E6DFD3; }
            .email-input { background-color: #3A4A5A; border-color: #4A5A6A; color: #E6DFD3; }
            .quote-card { background-color: #3A4A5A; color: #E6DFD3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-symbol"></div>
        
        <h1>社交7小时，独处0.5小时。<br>但你知道自己需要独处——<br>这份觉察，本身就是一种保护。</h1>
        
        <div class="subtitle">
            社交·心衡 · 首个采用“透支/富足”双视角的社交能量管理工具<br>
            专为高敏感人群设计 · 纯本地 · 零上传
        </div>

        <div class="email-form" id="signupForm">
            <input type="email" class="email-input" placeholder="输入邮箱，第一时间知道我们何时上线" required id="emailInput">
            <button type="submit" class="cta-button">了解更多</button>
        </div>

        <div class="footer-note">
            我们承诺：绝不上传您的任何数据。
        </div>
    </div>
</body>
</html>
